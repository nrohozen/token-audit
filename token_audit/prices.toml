# Claude API Token Pricing Configuration
# Prices are in USD per million tokens.
# Update these values when Anthropic changes pricing.
# Source: https://www.anthropic.com/pricing
# Last updated: 2026-06-13
#
# cache_write_per_mtok uses the 5-minute cache-write rate (the default
# ephemeral TTL). The 1-hour write rate is higher but isn't represented here,
# since transcripts use the default 5m TTL.
#
# Aliases and dated full IDs are both listed for each model so costs match
# regardless of which form a transcript records.
#
# To use a custom prices file, either:
#   - Place your edited copy at ~/.config/token-audit/prices.toml
#   - Pass --prices /path/to/your/prices.toml on the command line

version = "1"

# --- Fable / Mythos tier: $10 / $50 ---

[models.claude-fable-5]
input_per_mtok     = 10.00
output_per_mtok    = 50.00
cache_write_per_mtok = 12.50
cache_read_per_mtok  = 1.00

# Mythos 5 — limited availability (Project Glasswing); same pricing as Fable 5.
[models.claude-mythos-5]
input_per_mtok     = 10.00
output_per_mtok    = 50.00
cache_write_per_mtok = 12.50
cache_read_per_mtok  = 1.00

